name: tofu-ci

# Staged native OpenTofu CI (replaces the fogg-driven workflow removed in
# improvement-#002). find-changed -> dev -> staging -> prod -> rest. Each tier
# validates only the CHANGED stacks in it, as a matrix. Tiers are chained so a
# downstream tier is SKIPPED if any upstream tier failed: dev/staging/prod mirror
# each other, so if the env in front is broken the rest would break too — no
# point burning the runners.

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

concurrency:
  group: tofu-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  find-changed:
    runs-on: ubuntu-latest
    outputs:
      dev: ${{ steps.bucket.outputs.dev }}
      staging: ${{ steps.bucket.outputs.staging }}
      prod: ${{ steps.bucket.outputs.prod }}
      rest: ${{ steps.bucket.outputs.rest }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          list-files: json
          filters: |
            changed:
              - added|modified: 'terraform/**/*.tf'
      - uses: actions/github-script@v8
        id: bucket
        with:
          script: |
            const path = require("path")
            const fs = require("fs")
            // Stacks listed here can't be validated in CI (e.g. they pull the
            // inaccessible chanzuckerberg/shared-infra module — see CZID-90).
            let skip = new Set()
            try {
              skip = new Set(fs.readFileSync(".github/tofu-ci-skip.txt", "utf8")
                .split("\n").map(s => s.trim()).filter(s => s && !s.startsWith("#")))
            } catch (e) {}
            const files = ${{ steps.filter.outputs.changed_files }}
            const all = [...new Set(files
              .filter(f => f.endsWith(".tf") && !f.includes("/.terraform/"))
              .map(f => path.dirname(f)))]
            const skipped = all.filter(s => skip.has(s)).sort()
            const stacks = all.filter(s => !skip.has(s))
            if (skipped.length) core.notice(`Skipping ${skipped.length} stack(s) excluded by .github/tofu-ci-skip.txt (chanzuckerberg/shared-infra unavailable — CZID-90): ${skipped.join(", ")}`)
            // Tier each changed stack. envs/{dev,staging,prod} and their matching
            // account dir mirror each other; everything else runs last in "rest".
            const b = { dev: [], staging: [], prod: [], rest: [] }
            for (const s of stacks) {
              if (s.startsWith("terraform/envs/dev/") || s === "terraform/accounts/idseq-dev") b.dev.push(s)
              else if (s.startsWith("terraform/envs/staging/") || s === "terraform/accounts/idseq-staging") b.staging.push(s)
              else if (s.startsWith("terraform/envs/prod/") || s === "terraform/accounts/idseq-prod") b.prod.push(s)
              else b.rest.push(s) // modules, _shared, accounts/idseq-support, envs/{public,sandbox}
            }
            for (const k of Object.keys(b)) core.setOutput(k, JSON.stringify(b[k].sort()))

  validate-dev:
    needs: find-changed
    if: ${{ needs.find-changed.outputs.dev != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stack: ${{ fromJson(needs.find-changed.outputs.dev) }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/tofu-validate
        with:
          stack: ${{ matrix.stack }}

  validate-staging:
    needs: [find-changed, validate-dev]
    if: >-
      ${{ always()
          && needs.find-changed.result == 'success'
          && needs.find-changed.outputs.staging != '[]'
          && needs.validate-dev.result != 'failure'
          && needs.validate-dev.result != 'cancelled' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stack: ${{ fromJson(needs.find-changed.outputs.staging) }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/tofu-validate
        with:
          stack: ${{ matrix.stack }}

  validate-prod:
    needs: [find-changed, validate-dev, validate-staging]
    if: >-
      ${{ always()
          && needs.find-changed.result == 'success'
          && needs.find-changed.outputs.prod != '[]'
          && needs.validate-dev.result != 'failure' && needs.validate-dev.result != 'cancelled'
          && needs.validate-staging.result != 'failure' && needs.validate-staging.result != 'cancelled' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stack: ${{ fromJson(needs.find-changed.outputs.prod) }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/tofu-validate
        with:
          stack: ${{ matrix.stack }}

  validate-rest:
    needs: [find-changed, validate-dev, validate-staging, validate-prod]
    if: >-
      ${{ always()
          && needs.find-changed.result == 'success'
          && needs.find-changed.outputs.rest != '[]'
          && needs.validate-dev.result != 'failure' && needs.validate-dev.result != 'cancelled'
          && needs.validate-staging.result != 'failure' && needs.validate-staging.result != 'cancelled'
          && needs.validate-prod.result != 'failure' && needs.validate-prod.result != 'cancelled' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stack: ${{ fromJson(needs.find-changed.outputs.rest) }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/tofu-validate
        with:
          stack: ${{ matrix.stack }}
