name: Terraform Apply Component Call
run-name: Terraform Apply Component Call with env ${{ inputs.environment }} component ${{ inputs.component }} workflow ${{ inputs.workflow-run-id }}

on:
  workflow_call:
    inputs:
      environment:
        description: Both Github Environment and AWS Environment
        type: string
        required: true
      component:
        description: 'Fogg Component, located in the terraform/emvs/<environment>/<component> directory'
        type: string
        required: true
      run-id:
        description: 'Github Action Workflow Run ID'
        type: string
        required: true
      #plan-artifact-id:
