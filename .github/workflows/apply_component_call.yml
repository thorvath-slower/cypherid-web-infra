name: Terraform Apply Component Call
run-name: Terraform Apply Component Call with env ${{ inputs.environment }} component ${{ inputs.component }} workflow ${{ inputs.run-id }}

on:
  workflow_call:
    inputs:
      environment:
        description: Both Github Environment and AWS Environment
        type: string
        required: true
      component:
        description: 'Stack directory under terraform/envs/<environment>/<component>'
        type: string
        required: true
      run-id:
        description: Github Action Workflow Run ID of a Terraform Plan all Components run
        type: number
        required: false
    secrets:
      AUTH0_CLIENT_ID:
        required: true
      AUTH0_CLIENT_SECRET:
        required: true
      AUTH0_DOMAIN:
        required: true
    outputs:
      result-artifact-id:
        description: The Artifact ID of the Result JSON
        value: ${{ jobs.apply-component.outputs.result-artifact-id }}

env:
  AWS_REGION: us-west-2
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  apply-component:
    name: Terraform Apply Component - ${{ inputs.component }}
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    outputs:
      result-artifact-id: ${{ steps.upload-result.outputs.artifact-id }}
    steps:
      - name: Git clone the repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Reconfigure Git to use HTTP authentication
        run: |
          git config --global url."https://github.com/".insteadOf ssh://git@github.com/
      - name: Install AWS CLI
        uses: unfor19/install-aws-cli-action@f5b46b7f32cf5e7ebd652656c5036bf83dd1e60c # v1
        with:
          version: 2
          verbose: false
          arch: amd64
      - name: Configure AWS Credentials
        if: ${{ !env.ACT }}
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/czid-${{ inputs.environment }}-gh-actions-executor
          #output-credentials: true
          output-env-credentials: true
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}
          aws-profile: idseq-${{ inputs.environment }}
      - name: Configure AWS Credentials for local execution using nektos act
        if: ${{ env.ACT }}
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: czid-${{ inputs.environment }}-gh-actions-executor
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          #output-credentials: true
          output-env-credentials: true
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}
          aws-profile: idseq-${{ inputs.environment }}
      - name: Read Terraform version (SSOT = .terraform-version)
        id: tfver
        run: echo "version=$(cat .terraform-version)" >> "$GITHUB_OUTPUT"
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ steps.tfver.outputs.version }}
      - name: Verify AWS auth + terraform
        run: |
          aws sts get-caller-identity --profile "idseq-${{ inputs.environment }}" --no-cli-pager --no-cli-auto-prompt
          terraform version
      - name: Download Plan Artifact
        if: ${{ inputs.run-id && !env.ACT }}
        uses: actions/download-artifact@v5
        with:
          #artifact-ids: ${{ inputs.plan-artifact-id }}
          name: 'plan-${{ inputs.component }}'
          path: './terraform/envs/${{ inputs.environment }}/${{ inputs.component }}/'
          run-id: ${{ inputs.run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      #- name: 'Download Plan Artifact using nektos act'
      #  if: ${{ inputs.run-id && env.ACT }}
      #  uses: actions/download-artifact@v5 # TODO: nektosact requires this for local cross-workflow artifacts
      #  with:
      #    name: 'plan-${{ inputs.component }}'
      #    path: './terraform/envs/${{ inputs.environment }}/${{ inputs.component }}/'
      #    run-id: ${{ inputs.run-id }}
      #- name: 'Decompress Plan Artifact while using nektos act'
      #  if: ${{ inputs.run-id && env.ACT }}
      #  working-directory: './terraform/envs/${{ inputs.environment }}/${{ inputs.component }}/'
      #  run: |
      #    unzip 'plan-${{ inputs.component }}.zip'
      #    rm 'plan-${{ inputs.component }}.zip'
      - name: Terraform Init
        working-directory: './terraform/envs/${{ inputs.environment }}/${{ inputs.component }}/'
        run: |
          terraform init -input=false
      - name: Terraform Plan
        if: ${{ !inputs.run-id }}
        working-directory: './terraform/envs/${{ inputs.environment }}/${{ inputs.component }}'
        env:
          AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
          AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_CLIENT_SECRET }}
          AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
        run: |
          terraform plan -input=false -out=tf.plan
      - name: Terraform Apply
        working-directory: "./terraform/envs/${{ inputs.environment }}/${{ inputs.component }}/"
        env:
          # TODO: Get these from Parameter Store instead of GitHub Secrets
          AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
          AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_CLIENT_SECRET }}
          AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          # TODO: Handle special cases, like route53 which needs idseq-prod access; or fix route53 to be profile-specific only
        run: |
          set +e
          terraform apply -input=false -auto-approve -json tf.plan > applied.json
          exitcode=$?
          echo "Terraform exited with exit-code $exitcode"
          set -e
          if [[ $exitcode -ne 0 ]]; then
            jq . applied.json
            exit $exitcode
          fi
          jq '. | select(.type == "apply_complete" and .hook.action != "read") | {address: .hook.resource.addr, action: .hook.action}' applied.json | jq -c --slurp . > "${{ github.workspace }}/resources_changed.json"
          jq -c . "${{ github.workspace }}/resources_changed.json"
      # TODO: Only uncomment for local execution via nektos act, when testing outputs and artifacts
      #- name: Terraform Apply
      #  run: |
      #    change_count=$(( RANDOM % 4 ))
      #    if [[ $change_count -eq 0 ]]; then
      #      jq -cn '$ARGS.positional' > "${{ github.workspace }}/resources_changed.json"
      #    else
      #      jq -cn '$ARGS.positional' --jsonargs '{"address": "foo", "action": "create"}' '{"address": "bar", "action": "update"}' '{"address": "baz", "action": "delete"}' > "${{ github.workspace }}/resources_changed.json"
      #    fi
      #    jq -c . "${{ github.workspace }}/resources_changed.json"
      - name: Create Result JSON
        run: |
          change_count=$(jq 'length' "${{ github.workspace }}/resources_changed.json")
          echo "change-count=$change_count"
          jq -cnS \
            --arg environment "${{ inputs.environment }}" \
            --arg component "${{ inputs.component }}" \
            --argjson change_count "$change_count" \
            --argjson resources_changed $(<"${{ github.workspace }}/resources_changed.json") \
            '$ARGS.named' > "${{ github.workspace }}/result.json"
          jq . "${{ github.workspace }}/result.json"
      - name: Upload Result JSON as Artifact
        id: upload-result
        uses: actions/upload-artifact@v5
        with:
          name: result-${{ inputs.component }}
          path: ${{ github.workspace }}/result.json
          retention-days: 30
          if-no-files-found: error
