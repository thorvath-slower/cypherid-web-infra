name: security

# Security scanning gates (improvement-#010). Large, long-lived repo (100+
# stacks) with a backlog of pre-existing IaC findings, so the misconfig/lint
# scanners run in REPORT mode (surface, don't block) and ratchet to hard-fail
# as the backlog is burned down. Secret scanning DOES hard-fail.
#   - gitleaks : secrets over git history — HARD-FAIL (FPs triaged in .gitleaks.toml)
#   - trivy    : vuln + IaC misconfig + secret — REPORT ONLY (exit-code 0) for now
#   - tflint   : OpenTofu lint — REPORT ONLY across the many stacks for now
#   - checkov  : deep IaC policy pass — OPT-IN (run_checkov flag), report-only

on:
  push:
  pull_request:
  merge_group:
  workflow_dispatch:
    inputs:
      run_checkov:
        description: "Also run the full Checkov policy pass (full-suite / prod check)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          VER=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" | tar -xz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
      - name: Scan git history for secrets (hard-fail)
        run: gitleaks git . --redact --no-banner --exit-code 1

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Trivy (report only — backlog triage in progress)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0   # TODO(improvement-#010): ratchet to 1 once the backlog is triaged

  tflint:
    runs-on: ubuntu-latest
    continue-on-error: true   # report only across the 100+ stacks for now
    steps:
      - uses: actions/checkout@v6
      - uses: terraform-linter/setup-tflint@v4
        with:
          tflint_version: latest
      - run: tflint --recursive --format compact

  checkov:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_checkov }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          soft_fail: true
          output_format: cli
