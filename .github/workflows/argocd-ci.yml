name: argocd-ci

# Tests-first gate for the blue/green deploy wiring (feature-#002). On any change
# under deploy/argocd/**: schema-validate every Argo CD manifest (AppProject,
# app-of-apps root, Applications) against the Argo CRD schemas, and sanity-check
# the per-env promotion gates. The `chart` job additionally renders the actual
# seqtoid-web Helm chart (checked out from the app repo, per the Argo multi-source
# model) against these env values and schema-validates the output — including the
# Argo Rollout / AnalysisTemplate CRDs (#327).

on:
  push:
    paths:
      - 'deploy/argocd/**'
      - '.github/workflows/argocd-ci.yml'
  pull_request:
    paths:
      - 'deploy/argocd/**'
      - '.github/workflows/argocd-ci.yml'
  merge_group:

concurrency:
  group: argocd-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CRD_SCHEMAS: 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install kubeconform
        run: |
          KV=0.6.7
          curl -fsSL "https://github.com/yannh/kubeconform/releases/download/v${KV}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz kubeconform
          sudo install -m 0755 kubeconform /usr/local/bin/kubeconform

      - name: Validate Argo CD manifests
        run: |
          kubeconform -strict -summary \
            -schema-location default -schema-location "$CRD_SCHEMAS" \
            deploy/argocd/projects deploy/argocd/bootstrap deploy/argocd/apps

      - name: Assert per-env promotion gates
        run: |
          set -e
          grep -q 'autoPromotionEnabled: true'  deploy/argocd/values/seqtoid-web/dev.yaml
          grep -q 'autoPromotionEnabled: true'  deploy/argocd/values/seqtoid-web/staging.yaml
          grep -q 'autoPromotionEnabled: false' deploy/argocd/values/seqtoid-web/prod.yaml
          # analysis gate must be on in every env
          for e in dev staging prod; do
            grep -q 'enabled: true' deploy/argocd/values/seqtoid-web/$e.yaml
          done
          echo "promotion gates OK (dev/staging auto, prod manual; analysis on everywhere)"

      - name: Assert the load-balancer wiring (improvement-#015)
        run: |
          set -e
          # The LB controller app must exist and target kube-system.
          test -f deploy/argocd/apps/aws-load-balancer-controller.yaml
          grep -q 'chart: aws-load-balancer-controller' deploy/argocd/apps/aws-load-balancer-controller.yaml
          grep -q 'namespace: kube-system'              deploy/argocd/apps/aws-load-balancer-controller.yaml
          # Every env must expose a public edge.
          for e in dev staging prod; do
            grep -qA1 '^ingress:' deploy/argocd/values/seqtoid-web/$e.yaml
            grep -q 'enabled: true' <(grep -A1 '^ingress:' deploy/argocd/values/seqtoid-web/$e.yaml)
          done
          echo "load-balancer wiring OK (controller app + per-env ingress enabled)"

  chart:
    # Render the REAL seqtoid-web chart (from the app repo) against these env values
    # and schema-validate the output, incl. the Argo Rollout/AnalysisTemplate CRDs.
    # Mirrors the Argo CD multi-source Application: chart from the app repo, values here.
    #
    # Requires CHART_READ_TOKEN (read access to the private seqtoid-web fork; same
    # class of secret as the GitOps token, #74/#444) and, until the chart lands on the
    # app repo's default branch, CHART_REF pointed at the chart branch. Defaults target
    # the fork's main.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infra (env values)
        uses: actions/checkout@v6

      - name: Checkout seqtoid-web (the chart)
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.CHART_REPO || 'thorvath-slower/seqtoid-web' }}
          ref: ${{ vars.CHART_REF || 'main' }}
          token: ${{ secrets.CHART_READ_TOKEN || secrets.GITHUB_TOKEN }}
          path: _chart-src

      - name: Install helm + kubeconform
        run: |
          HV=3.16.4
          curl -fsSL "https://get.helm.sh/helm-v${HV}-linux-amd64.tar.gz" \
            | tar -xz linux-amd64/helm
          sudo install -m 0755 linux-amd64/helm /usr/local/bin/helm
          KV=0.6.7
          curl -fsSL "https://github.com/yannh/kubeconform/releases/download/v${KV}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz kubeconform
          sudo install -m 0755 kubeconform /usr/local/bin/kubeconform

      - name: helm lint
        run: helm lint _chart-src/deploy/charts/seqtoid-web

      - name: helm template + kubeconform (all envs, incl. Rollout/AnalysisTemplate CRDs)
        run: |
          set -euo pipefail
          CHART=_chart-src/deploy/charts/seqtoid-web
          for e in dev staging prod; do
            echo "== $e =="
            helm template svc "$CHART" -f "deploy/argocd/values/seqtoid-web/$e.yaml" \
              | kubeconform -strict -summary -verbose \
                  -schema-location default -schema-location "$CRD_SCHEMAS" \
                  -kubernetes-version 1.30.0
          done

      - name: Assert the chart shape (Rollout not Deployment; analysis gate; prod manual)
        run: |
          set -euo pipefail
          CHART=_chart-src/deploy/charts/seqtoid-web
          helm template svc "$CHART" -f deploy/argocd/values/seqtoid-web/prod.yaml > /tmp/prod.yaml
          # The web workload must be an Argo Rollout, not a plain Deployment.
          grep -q '^kind: Rollout' /tmp/prod.yaml
          # The smoke gate template must render and be referenced by the Rollout.
          grep -q 'kind: AnalysisTemplate' /tmp/prod.yaml
          grep -q 'prePromotionAnalysis' /tmp/prod.yaml
          # prod must keep the manual promotion gate.
          grep -q 'autoPromotionEnabled: false' /tmp/prod.yaml
          # The migration must run as a pre-sync hook.
          grep -q 'argocd.argoproj.io/hook: PreSync' /tmp/prod.yaml
          echo "chart shape OK (Rollout + analysis gate + prod manual + presync migrate)"
