name: validate-stack

# Reusable per-stack validator. One "bucket" = one logical stack (e.g. auth0,
# db, access-management, or the aws-accounts trio). The stack's environments are
# validated as a CHAIN — dev, then staging, then prod — because dev/staging/prod
# are meant to mirror each other: if a stack fails to validate in dev, the same
# definition would fail in staging and prod, so we skip them rather than burn
# runners. An env whose path is empty (the stack doesn't exist in that env, or it
# is excluded by .github/terraform-ci-skip.txt) is skipped WITHOUT blocking the envs
# behind it, so partial mirrors (e.g. staging+prod-only stacks) still chain.
#
# Each call is one matrix leg of tofu_ci.yml's validate-stacks job, so buckets
# run concurrently with each other while each bucket chains internally.

on:
  workflow_call:
    inputs:
      name:
        description: Display name of the stack / bucket (e.g. auth0, aws-accounts).
        required: true
        type: string
      dev:
        description: dev-tier stack dir to validate, or "" to skip this tier.
        required: false
        type: string
        default: ""
      staging:
        description: staging-tier stack dir to validate, or "" to skip this tier.
        required: false
        type: string
        default: ""
      prod:
        description: prod-tier stack dir to validate, or "" to skip this tier.
        required: false
        type: string
        default: ""

jobs:
  dev:
    if: ${{ inputs.dev != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/terraform-validate
        with:
          stack: ${{ inputs.dev }}

  staging:
    needs: dev
    # Runs when staging exists AND no upstream env FAILED. A skipped/empty dev
    # (dev != failure) does not block staging; a failed dev does.
    if: ${{ inputs.staging != '' && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/terraform-validate
        with:
          stack: ${{ inputs.staging }}

  prod:
    needs: [dev, staging]
    if: ${{ inputs.prod != '' && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/terraform-validate
        with:
          stack: ${{ inputs.prod }}
