name: actionlint

on:
  pull_request:
    paths:
      - ".github/workflows/**"
  push:
    branches: [main, integration]
    paths:
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: actionlint
        # Enforces workflow structure (bad uses:/needs:/outputs, input/secret
        # typing). Image pinned by digest. shellcheck deferred (-shellcheck=);
        # the run:-script quoting backlog is tracked separately, ratchet on later.
        run: |
          docker run --rm -v "$PWD":/repo -w /repo \
            rhysd/actionlint@sha256:887a259a5a534f3c4f36cb02dca341673c6089431057242cdc931e9f133147e9 \
            -color -shellcheck=
