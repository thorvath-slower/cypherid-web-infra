          "aws.czi-si": aws.czi-si
      auth0:
        providers:
          auth0:
            domain: dev-ep4y3efh1vxvw06z.us.auth0.com
        extra_vars:
          auth0_domain: dev-ep4y3efh1vxvw06z.us.auth0.com
        depends_on:
          components:
            - route53
            - web
      cloud-env:
        module_source: terraform/modules/aws-env-v4.0.0
        module_name: aws-env
        variables:
          - single_nat_gateway
          - k8s_cluster_names
      downloads:
        depends_on:
          components:
            - cloud-env
      # TODO: Some modules only used to exist in other environments, but we added them here for testing purposes
