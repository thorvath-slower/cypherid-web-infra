        module_name: eks-cluster
        provider_aliases:
          aws.us-east-1: aws.us-east-1
      route53:
      k8s-core:
        depends_on:
          components:
            - eks
            - route53
        module_source: terraform/modules/k8s-core-v5.5.1
        module_name: k8s-core
        #extra_vars:
        #  ie_ops_genie_team: Core Infra Eng
        variables:
          - additional_addons
      happy:
        depends_on:
