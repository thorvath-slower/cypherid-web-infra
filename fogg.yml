global:
  providers:
    aws:
      account_id: invalid-account-id
      profile: invalid-profile
accounts:
  idseq-dev:
    backend:
      kind: s3
      account_id: 491013321714
      bucket: tfstate-491013321714-test
      region: us-west-2
      profile: idseq-dev
    providers:
      aws:
        account_id: 491013321714
        profile: idseq-dev
    extra_vars:
      dynamodb_enabled: false
      #prevent_unencrypted_uploads: false
      s3_bucket_name: tfstate-491013321714-test
  idseq-support:
    backend:
      kind: s3
      account_id: 941377154785
      bucket: tfstate-941377154785-test
      region: us-west-2
      profile: idseq-support
    providers:
      aws:
        account_id: 941377154785
        profile: idseq-support
  idseq-staging:
    backend:
      kind: s3
      account_id: 030998640247
      bucket: tfstate-030998640247
      region: us-west-2
      profile: idseq-staging
    providers:
      aws:
        account_id: 030998640247
        profile: idseq-staging
    extra_vars:
      dynamodb_enabled: false
      #prevent_unencrypted_uploads: false
      s3_bucket_name: tfstate-030998640247
  idseq-prod:
    backend:
      kind: s3
      account_id: 283694049553
      bucket: tfstate-283694049553
      region: us-west-2
      profile: idseq-prod
    providers:
      aws:
        account_id: 283694049553
        profile: idseq-prod
    extra_vars:
      s3_bucket_name: tfstate-283694049553
defaults:
  #needs_aws_accounts_variable: false
  depends_on:
    accounts: []
    components: []
  extra_vars:
    base_domain: seqtoid.org
    alignment_index_date: "2021-01-22"
    build_index_date: "2021-01-22"
    s3_bucket_public_references: seqtoid-public-references
    s3_bucket_idseq_bench: idseq-bench # TODO: what is this used for?
    s3_bucket_secrets: idseq-secrets # TODO: what is this used for?
    #s3_bucket_workflows: cypherid-samples-deleteme # No longer hardcoded, but computed as "seqtoid-workflows-${env}-${account_id}"
  owner: biohub-tech@chanzuckerberg.com
  project: idseq
  providers:
    aws:
      #account_id: invalid-account-id
      additional_regions:
        - us-east-1
      #profile: invalid-profile
      region: us-west-2
      version: ~> 5.100.0
      additional_providers:
        czi-si:
          account_id: 283694049553
          region: us-west-2
          profile: idseq-prod
          additional_regions:
            - us-east-1
    auth0:
      version: ~> 1.41.0 # 0.26.2
      source: auth0/auth0
    kubernetes:
      enabled: true
      #version: 2.23.0
      #version: 2.38.0
      #version: ~> 3.0.1
      version: ~> 3.1.0
    kubectl:
      #version: 1.14.0
      version: ~> 1.19.0
    helm:
      #version: 2.11.0
      version: ~> 2.17.0
      #version: 3.1.2
    #datadog:
    #  custom_provider: true
    #  version: 3.20.0
    #opsgenie:
    #  version: 0.6.14
    #okta:
    #  custom_provider: true
    #  version: 3.41.0
    #  registry_namespace: okta
    #  org_name: czi-prod
  terraform_version: 1.14.8
  tools:
    #tflint:
    #  enabled: true
    github_actions_ci:
      aws_iam_role_name: infraci
      command: lint
      enabled: true
      providers:
        aws:
          disabled: true
      ssh_key_secrets:
        - SHARED_INFRA_DEPLOY_KEY
      test_buckets: 20
envs:
  dev:
