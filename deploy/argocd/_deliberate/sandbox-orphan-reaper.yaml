# Sandbox ORPHAN REAPER -- the retention guarantee for per-PR sandboxes (#697).
#
# WHY THIS EXISTS: sandbox teardown is BEST-EFFORT. Its PostDelete hook has three known ways to
# never run, each stranding a MySQL schema that now holds COPIED USER PII (sandbox:seed_users):
#   (a) the teardown Job renders from the PR head SHA, but the gitops flow closes PRs with
#       --delete-branch -- once that commit is unreachable the hook cannot render;
#   (b) it pulls seqtoid-web-preview:sha-<head8>, and that ECR repo expires all but the 30 most
#       recent tags, so a long-lived PR cannot pull its own teardown image;
#   (c) any failed teardown Job wedges deletion behind the Argo finalizer forever.
# In every case the only signal is an Application stuck Terminating. This system has ALREADY lost
# cleanup twice: #288 (leaked ~40 SSM params) and #257 (orphaned namespaces). A hook that usually
# runs is not a retention guarantee, and "usually" is not an acceptable bar for PII.
#
# HOW THIS IS DIFFERENT from the existing seqtoid-preview-ttl-reaper: that one bounds sandbox AGE
# (it removes the `preview` label at 7 days and lets the normal delete path run) and sweeps
# orphaned NAMESPACES. It never touches DB schemas, DB users, or SSM. It also depends on the same
# delete path that (a)/(b)/(c) break. This reaper depends on NONE of that machinery -- it lists
# what physically exists, asks GitHub what is open, and destroys the difference.
#
# IMAGE: seqtoid-web:latest, deliberately. The ECR lifecycle for that repo explicitly always keeps
# `latest` ("an image that matches the tagging requirements of a rule cannot be expired by a rule
# with a lower priority", seqtoid-web-ecr.tf), so the reaper can always pull. Pinning a per-PR tag
# here would recreate failure mode (b) inside the very thing that exists to survive it.
#
# SAFETY: `rake sandbox:reap_orphans` FAILS CLOSED -- if the open-PR list cannot be fetched it
# reaps nothing, because a bad list would drop a live sandbox someone is using. Sandbox names are
# built only from a validated positive integer, so it can only ever touch idseq_pr_<N>/sbx_pr_<N>,
# never idseq_dev. The IAM role is destroy-only (no ssm:PutParameter).
#
# Applied out-of-band (like the rest of _deliberate) because the ArgoCD install here is a Helm
# release that is not in git. Requires terraform/envs/dev/web/eks-irsa-sandbox-reaper.tf applied.
#
# SHIPS IN DRY RUN (SANDBOX_REAP_DRY_RUN=1): it logs what it WOULD reap and deletes nothing.
# Read one hourly cycle's logs, confirm the orphan list is what you expect, then arm it by setting
# that variable to "0" in its own commit. See the note on the variable itself.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: seqtoid-sandbox-reaper
  namespace: argocd
  annotations:
    # From terraform output seqtoid_sandbox_reaper_role_arn (dev/web).
    eks.amazonaws.com/role-arn: arn:aws:iam::491013321714:role/seqtoid-sandbox-reaper
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: seqtoid-sandbox-orphan-reaper
  namespace: argocd
  labels:
    app.kubernetes.io/name: seqtoid-sandbox-orphan-reaper
    app.kubernetes.io/component: preview-retention
spec:
  # Hourly. The window between a PR closing and its PII being gone should be measured in minutes,
  # not days -- and unlike the ttl-reaper's age pass, this one is cheap and idempotent.
  schedule: "17 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 900
      template:
        metadata:
          annotations:
            # Do not let Karpenter evict a reap mid-DROP.
            karpenter.sh/do-not-disrupt: "true"
        spec:
          restartPolicy: Never
          serviceAccountName: seqtoid-sandbox-reaper
          containers:
            - name: reaper
              image: 491013321714.dkr.ecr.us-west-2.amazonaws.com/seqtoid-web:latest
              imagePullPolicy: Always
              args: ["rake", "sandbox:reap_orphans"]
              env:
                - name: RAILS_ENV
                  value: development
                - name: ENVIRONMENT
                  value: dev
                - name: RAILS_LOG_TO_STDOUT
                  value: "yes"
                - name: AWS_REGION
                  value: us-west-2
                - name: AWS_DEFAULT_REGION
                  value: us-west-2
                # Master creds + shared config: the reaper must connect as master to DROP an
                # orphaned schema and its scoped user.
                - name: CHAMBER_SERVICE
                  value: idseq-dev-web
                - name: SANDBOX_GITHUB_REPO
                  value: IT-Academic-Research-Services/seqtoid-web
                # Same PAT the preview ApplicationSet generator + ttl-reaper already use.
                - name: GITHUB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: github-pr-generator
                      key: token
                # DRY RUN BY DEFAULT. This job DROPs schemas and DELETEs SSM paths on an hourly
                # timer, unattended, and the schemas hold copied user PII -- the blast radius of a
                # wrong answer here is data nobody can get back. So the safe value is the one you
                # get by doing nothing.
                #
                # It shipped as "0" under a header that says "DRY RUN FIRST", i.e. the file's own
                # instruction and its value disagreed, and the value won. A safety step that
                # depends on someone remembering to edit a line before merging is not a safety
                # step; the next person to add a sandbox gets no such reminder.
                #
                # In dry-run the reaper does the full read path -- lists live schemas + SSM paths,
                # asks GitHub which PRs are open, computes the difference -- and logs what it WOULD
                # destroy without destroying it. That is exactly the evidence needed to trust it.
                #
                # TO ARM IT: read one hourly cycle's logs, confirm the orphan list matches the PRs
                # you expect to be gone (and nothing you expect to be live), then set this to "0"
                # in a commit of its own, so arming is a reviewable act with a diff attached.
                - name: SANDBOX_REAP_DRY_RUN
                  value: "1"
              resources:
                requests:
                  cpu: 100m
                  memory: 512Mi
                limits:
                  cpu: 500m
                  memory: 1Gi
