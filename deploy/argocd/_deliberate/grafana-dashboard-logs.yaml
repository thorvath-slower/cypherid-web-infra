# Observability Phase 4 (#608/#700): custom Logs Overview dashboard on Loki (fed by the Alloy
# DaemonSet). Log volume by namespace + error-line rate + a live app log stream, all sortable by
# the namespace/pod/container/app labels Alloy attaches. Loaded by the kps Grafana sidecar.
# Apply: kubectl apply -f deploy/argocd/_deliberate/grafana-dashboard-logs.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-logs
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  logs.json: |
    {
      "uid": "seqtoid-logs",
      "title": "seqtoid - Logs Overview",
      "tags": ["seqtoid", "logs", "loki"],
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "custom",
            "query": "seqtoid-dev,argocd,monitoring,kube-system,karpenter,cert-manager,external-dns",
            "current": { "text": "seqtoid-dev", "value": "seqtoid-dev" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Log line rate by namespace",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "fieldConfig": { "defaults": { "unit": "logs/s" }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "sum by (namespace) (rate({cluster=\"czid-dev-eks-v2\"}[5m]))",
              "legendFormat": "{{namespace}}"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Error-level log rate (all namespaces)",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "fieldConfig": { "defaults": { "unit": "logs/s" }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "sum by (namespace) (rate({cluster=\"czid-dev-eks-v2\"} |~ \"(?i)\\\\b(error|fatal|panic|exception)\\\\b\"[5m]))",
              "legendFormat": "{{namespace}}"
            }
          ]
        },
        {
          "id": 3,
          "type": "logs",
          "title": "Logs: $namespace",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 8 },
          "options": { "showTime": true, "wrapLogMessage": true, "enableLogDetails": true, "sortOrder": "Descending" },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "{namespace=\"$namespace\"}"
            }
          ]
        }
      ]
    }
