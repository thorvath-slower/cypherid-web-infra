# seqtoid-web @ dev. Multi-source: the chart comes from the app repo (versions
# with the code); the env values come from THIS repo (versions with deploy
# config). $values references the second source's checkout.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: seqtoid-web-dev
  namespace: argocd
spec:
  project: czid
  sources:
    - repoURL: https://github.com/chanzuckerberg/seqtoid-web.git
      # Pin to a release tag/sha in practice; CI advances it on deploy.
      targetRevision: main
      path: deploy/charts/seqtoid-web
      helm:
        valueFiles:
          - $values/deploy/argocd/values/seqtoid-web/dev.yaml
    - repoURL: https://github.com/chanzuckerberg/cypherid-web-infra.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: czid-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
