# External Secrets Operator (CZID-325) — installed via Argo CD, mirrors the argo-rollouts app pattern.
# Syncs the app's Chamber SSM Parameter Store secrets into K8s Secrets (the seqtoid-web chart's
# SecretStore/ExternalSecret reference it). Replaces Chamber as the in-cluster secrets path.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
spec:
  project: czid
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.10.7   # pin to a current release on review
    helm:
      values: |
        installCRDs: true
        replicaCount: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # the ESO CRDs are large; SSA avoids the annotation-size limit
