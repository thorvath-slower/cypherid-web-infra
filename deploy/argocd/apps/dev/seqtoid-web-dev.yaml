# seqtoid-web @ dev. Multi-source: the chart comes from the app repo (versions
# with the code); the env values come from THIS repo (versions with deploy
# config). $values references the second source's checkout.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: seqtoid-web-dev
  namespace: argocd
spec:
  # The scoped czid AppProject now permits the seqtoid-* + argocd destinations this app and the
  # app-of-apps root need (see projects/czid.yaml, #698), so the app leaves the permissive built-in
  # `default` project. When czid-root-dev adopts this app, it moves it into `czid` in place.
  project: czid
  sources:
    - repoURL: https://github.com/IT-Academic-Research-Services/seqtoid-web.git
      # Pin to a release tag/sha in practice; CI advances it on deploy.
      targetRevision: main
      path: deploy/charts/seqtoid-web
      helm:
        valueFiles:
          - $values/deploy/argocd/values/seqtoid-web/dev.yaml
    - repoURL: https://github.com/IT-Academic-Research-Services/cypherid-web-infra.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: seqtoid-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
