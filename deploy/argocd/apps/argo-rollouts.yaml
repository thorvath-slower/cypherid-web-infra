# Installs the Argo Rollouts controller (+ dashboard) cluster-wide. This is the
# engine that runs the blue/green strategy + AnalysisRuns the seqtoid-web chart
# declares. Chart version is pinned; bump deliberately.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-rollouts
  namespace: argocd
spec:
  project: czid
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-rollouts
    targetRevision: 2.41.0
    helm:
      values: |
        controller:
          replicas: 2
        dashboard:
          enabled: true
        installCRDs: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argo-rollouts
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # the Rollouts CRDs are large; SSA avoids the annotation-size limit
