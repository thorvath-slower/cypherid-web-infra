# EXAMPLE ONLY -- do NOT commit real credentials. The real argocd-notifications-secret
# already exists in the argocd namespace (created empty by the argo-cd chart). Populate it
# out-of-band with the SeqtoID-Support (M365) SMTP creds; never put secrets in git.
#
# service.email in argocd-notifications-cm references these keys as $email-username /
# $email-password. Set them with (values NOT stored in this repo):
#
#   kubectl -n argocd patch secret argocd-notifications-secret --type merge \
#     -p '{"stringData":{"email-username":"SeqtoID-Support@ucsf.edu","email-password":"<m365-app-password>"}}'
#
# M365 SMTP AUTH (smtp.office365.com:587 STARTTLS) must be enabled for the mailbox, and an
# app password issued if the tenant enforces MFA. Once set, the controller reloads within
# seconds (it watches the secret) and alerts deliver.
apiVersion: v1
kind: Secret
metadata:
  name: argocd-notifications-secret
  namespace: argocd
type: Opaque
stringData:
  email-username: "REPLACE_ME"   # SeqtoID-Support@ucsf.edu
  email-password: "REPLACE_ME"   # M365 app password
