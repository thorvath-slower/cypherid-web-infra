# seqtoid-web @ dev — filled for the EKS/Argo strangler bring-up (#319).
# PROVING PHASE: ingress is DISABLED — the app runs + the in-cluster blue/green smoke
# gate curls it (proving it boots + connects to DB/secrets/S3 via chamber+IRSA), and we
# verify with `kubectl port-forward`. NO ALB, NO cert, NO DNS, zero exposure. The ingress
# block below is pre-filled with the real cutover values; enabling it (stage 5) creates the
# ALB and points dev.seqtoid.org at it — the deliberate cutover, do it with a test-host check.
environment: dev
image:
  # Dev-account ECR, go-forward repo (the CZID-76 dual-push lands here too).
  repository: 491013321714.dkr.ecr.us-west-2.amazonaws.com/seqtoid-web
  tag: sha-cdb05ece # the current hardened known-good build; CI advances this per build
# COST SPIN-DOWN (dev): scale ALL workloads to 0 and skip the migrate/taxon-load hooks
# (chart `suspend`). Safe + reversible — the app's data lives in Aurora + OpenSearch, not
# the pods. The CD keeps advancing `image.tag` while suspended, so flipping this to false
# (manually or via the weekend cadence, #487) brings the app up on the LATEST build.
# Now false: dev is live on czid-dev-eks-v2 serving real traffic. The weekend cadence
# (#487) still flips this to true on its schedule; dev.yaml is the source of truth again
# now that the old cluster's Argo app (which also read this file) is decommissioned.
suspend: false
replicaCount: 2
# Target the dedicated small Karpenter NodePool `seqtoid-web` (#486). The shared pool
# floors instance-cpu>8 (16-vCPU nodes) + consolidates empty nodes only after 24h; the
# dedicated pool allows small nodes (<9 vCPU, verified: a c6a.large/2-vCPU was picked)
# and reclaims fast (1m) — right-sizes the app AND makes the weekend spin-down actually
# free the node quickly. Merged with the chart's amd64 pin (both keys kept explicitly).
nodeSelector:
  kubernetes.io/arch: amd64
  seqtoid.io/pool: web
# Dev worker memory, sized to MEASURED usage.
#
# The chart asks 3Gi per worker, which is prod-ish and forced Karpenter onto an oversized
# node, so these were cut to 512Mi-1Gi. That went too far: the values were chosen against
# the chart default, not against what the workers actually consume, and they landed BELOW
# real usage. `kubectl top`, dev + sandboxes, 2026-07-17:
#
#   worker                  requested   ACTUAL      over
#   resque-pipeline-monitor   512Mi     1601Mi      3.1x
#   resque-result-monitor     512Mi     1618Mi      3.2x
#   shoryuken                 512Mi      884Mi      1.7x
#   resque-scheduler          512Mi      822Mi      1.6x
#   resque                      1Gi     1015Mi      at the line
#
# A request is what the SCHEDULER packs against, so under-requesting does not save memory --
# it hides the demand. Nodes reported "memory 3168Mi (47%) requested" while the kubelet was
# evicting with 6240Ki free against a 200Mi threshold (25 pods on a ~6.5Gi c7i-flex.xlarge).
# Pods died as Evicted/ContainerStatusUnknown, dev's own web pods were evicted with them
# (brief 503s), and under sustained pressure the kubelet stopped posting node status at all
# -- nodes going NotReady ~5 minutes into their life. Karpenter then made it worse by design:
# consolidation is WhenEmptyOrUnderutilized, so nodes that looked underutilized BY REQUEST
# were deleted and the survivors packed tighter.
#
# These are measured peaks + ~25% headroom. Nodes will be larger or more numerous; that is
# the real cost of these workers, previously paid in evictions instead of instances. Each
# Rails worker loads the whole app, which is why a "monitor" is not small.
#
# NOT set: memory LIMITS on workers. A monitor using 1.6Gi against a 512Mi request smells
# like a leak or an unbounded batch rather than a sizing miss (#709 step 3). Sizing contains
# the blast radius; it does not explain the appetite. Add limits once the cause is known --
# a limit set now would convert an unexplained leak into an OOMKill loop.
workers:
  resque:
    resources:
      requests:
        cpu: 250m
        memory: 1536Mi
  resque-scheduler:
    resources:
      requests:
        cpu: 100m
        memory: 1Gi
  resque-pipeline-monitor:
    resources:
      requests:
        cpu: 100m
        memory: 2Gi
  resque-result-monitor:
    resources:
      requests:
        cpu: 100m
        memory: 2Gi
  shoryuken:
    resources:
      requests:
        cpu: 100m
        memory: 1152Mi
serviceAccount:
  create: true
  name: seqtoid-web # MUST match the IRSA trust (system:serviceaccount:seqtoid-dev:seqtoid-web)
  roleArn: arn:aws:iam::491013321714:role/seqtoid-web-dev
blueGreen:
  autoPromotionEnabled: true # dev: promote on the smoke AnalysisTemplate passing
  scaleDownDelaySeconds: 30
  analysis:
    enabled: true
    postPromotion: false
# Web pod, sized to measured usage: dev web pods run 852-1015Mi (kubectl top, 2026-07-17).
#
# The 512Mi request was half of that, so the scheduler packed nodes against a number the pod
# passes within seconds of booting. The 1Gi LIMIT is the sharper edge: at 1015Mi a pod is
# sitting on 99% of its hard ceiling, and the only reason we are not seeing OOMKills is luck
# and timing -- one slow request with a big result set and the container dies. Raise the
# request to cover real usage and give the limit genuine headroom above it.
resources:
  requests:
    cpu: 250m
    memory: 1280Mi
  limits:
    memory: 2Gi
autoscaling:
  enabled: false
ingress:
  enabled: true # DNS cutover done — dev.seqtoid.org (+ www via aliasHosts) served by the v2 ALB
  host: dev.seqtoid.org
  # www.dev.seqtoid.org is a 301->apex vanity host. Route it through the same EKS
  # ALB (the app does the redirect) so the old ECS edge — which currently serves
  # this record — can be retired without breaking www. The ACM cert already covers
  # www (SAN). Only takes effect where the ingress is enabled (v2 via the app param).
  aliasHosts:
    - www.dev.seqtoid.org
  certificateArn: arn:aws:acm:us-west-2:491013321714:certificate/9881060c-5652-40b6-9132-72a94171e18b
  annotations:
    alb.ingress.kubernetes.io/subnets: subnet-06bfffadf91e2c189,subnet-0f94623d782341d71
